train_file: ["../../datasets/DGM4/metadata/trainval.json"] # use train and val set together
val_file: ["../../datasets/DGM4/metadata/test.json"]           

image_res: 256
vision_width: 768
embed_dim: 256
batch_size_train: 48
batch_size_val: 96
max_words: 50

enable_tf32: true
num_workers_train: 8
num_workers_val: 4
persistent_workers: true
prefetch_factor: 4
pin_memory: true
find_unused_parameters: false

loss_BIC_wgt: 1
loss_bbox_wgt: 0.1
loss_giou_wgt: 0.1
loss_MLC_wgt: 1
Loss_sim_wgt: 10

use_refactor_image_encoder: true
use_token_patch_aligner: false
image_feature_fusion_mode: residual
patch_grid_size: 16
token_output_mode: legacy

optimizer: {opt: adamW, lr: 0.000008, lr_img: 0.00003, weight_decay: 0.02}
schedular: {sched: cosine, lr: 0.000008, epochs: 50, min_lr: 0.0000008, decay_rate: 1, warmup_lr: 0.0000008, warmup_epochs: 5, cooldown_epochs: 0}

stages:
  enabled: true
  definitions:
    - name: stage1_bic_warmup
      start_epoch: 0
      end_epoch: 5
      freeze:
        trainable_groups: [fusion_head, bic_head]
      loss_weights:
        loss_BIC_wgt: 1
        loss_bbox_wgt: 0
        loss_giou_wgt: 0
        loss_MLC_wgt: 0
        Loss_sim_wgt: 0
      optimizer:
        lr: 0.00001
        lr_img: 0.00001
      schedular:
        epochs: 5
        warmup_epochs: 1

    - name: stage2_heads_alignment
      start_epoch: 5
      end_epoch: 20
      freeze:
        trainable_groups: [heads, intra_extra, positional_embeddings]
      loss_weights:
        loss_BIC_wgt: 1
        loss_bbox_wgt: 0.1
        loss_giou_wgt: 0.1
        loss_MLC_wgt: 1
        Loss_sim_wgt: 5
      optimizer:
        lr: 0.00001
        lr_img: 0.00001
      schedular:
        epochs: 15
        warmup_epochs: 2

    - name: stage3_full_finetune
      start_epoch: 20
      end_epoch: 50
      freeze:
        trainable_groups: [all]
      loss_weights:
        loss_BIC_wgt: 1
        loss_bbox_wgt: 0.1
        loss_giou_wgt: 0.1
        loss_MLC_wgt: 1
        Loss_sim_wgt: 10
      optimizer:
        lr: 0.00001
        lr_img: 0.00005
      schedular:
        epochs: 30
        warmup_epochs: 2







